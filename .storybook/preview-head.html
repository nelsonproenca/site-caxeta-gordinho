<!--
  app/layout.tsx wires fonts via next/font (Barlow Condensed, Titillium Web,
  JetBrains Mono), which only runs inside the Next.js build pipeline —
  Storybook never renders that root layout, so app/globals.css's
  --font-display/--font-body/--font-mono fall back to the literal family
  names below. Loading them here keeps stories visually faithful to the
  real site instead of falling further back to a generic sans-serif.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;1,600;1,700;1,800&family=Titillium+Web:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>
